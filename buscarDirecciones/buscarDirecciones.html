<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Direcciones</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.16.2/xlsx.full.min.js"></script>
    <script src="scripts.js" defer></script>
</head>
<body>
    <div class="titleContainer">
        <h1><strong>Buscar Direcciones Empresas</strong></h1>
        <!-- Botón Home -->
        <button class="home-button" onclick="location.href='../index.html'">Home</button>
    </div>
    <!-- Botón Ir al final en la parte superior derecha -->
    <button id="scrollTopButton" class="scroll-button topRight" onclick="scrollToBottom()">Ir al Final</button>

    <div class="file-input-wrapper">
        <div class="file-input-box">
            <p><strong>Selecciona la Base de Datos de Empresas</strong></p>
            <input type="file" id="fileInputData" accept=".xlsx, .xls" />
            <button onclick="processDataFile()">Aceptar</button>
            <button onclick="clearTable()">Limpiar</button> <!-- Botón Limpiar -->
        </div>
        <div class="file-input-box">
            <p><strong>Selecciona el archivo para Buscar Direcciones</strong></p>
            <input type="file" id="fileInputSearch" accept=".xlsx, .xls" />
            <button onclick="processSearchFile()">Aceptar</button>
            <button onclick="cancelSearchFile()">Cancelar</button> <!-- Botón Cancelar -->
        </div>
    </div>

    <div class="table-container table-box">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>No</th>
                    <th>NIT</th>
                    <th>Razón Social</th>
                    <th>Dirección Local</th>
                    <th>Municipio Local</th>
                    <th>Celular Local</th>
                    <th>Teléfono Local</th>
                    <th>Zona</th>
                    <th>Dirección Principal</th>
                    <th>Municipio Principal</th>
                    <th>Celular Principal</th>
                    <th>Teléfono Principal</th>
                    <th>Email Principal</th>
                </tr>
            </thead>
            <tbody id="dataBody">
                <!-- Data rows will be inserted here -->
            </tbody>
        </table>
    </div>
    <div id="pagination" class="pagination"></div>
    <div class="export-buttons">
        <button id="exportButton" class="export-button">Exportar a Excel</button>
        <!-- Botón "Subir" para desplazamiento en la parte inferior derecha -->
        <button id="scrollBottomButton" class="scroll-button bottomRight" onclick="scrollToTop()">Subir</button>
    </div>
</body>
</html>
